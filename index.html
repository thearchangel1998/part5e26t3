    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px;
        }

        .test-tab {
            flex: 0 0 auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .test-tab.active {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .option-card {
            display: flex;
            align-items: center;
            padding: 16px;
            margin-bottom: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .option-card:active { transform: scale(0.97); }

        .option-card.selected {
            border-color: #2563eb;
            background-color: #eff6ff;
        }

        .option-card.correct { border-color: #10b981; background-color: #f0fdf4; }
        .option-card.incorrect { border-color: #ef4444; background-color: #fef2f2; }

        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-item.active { color: #2563eb; }
        .nav-item.active svg { stroke: #2563eb; }
    </style>
</head>

            const test = allTests[key];
            document.getElementById('currentTestTitle').innerText = test.title;
            document.getElementById('currentTestDesc').innerText = test.desc;
            
            const list = document.getElementById('questionsList');
            list.innerHTML = '';
            userAnswers[key] = {};
            updateProgressBar();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            test.questions.forEach(q => {
                const card = document.createElement('div');
                card.className = "question-card bg-white p-6 rounded-3xl shadow-sm border border-slate-100";
                card.id = `q-card-${q.id}`;
                card.innerHTML = `
                    <div class="flex gap-3 mb-4">
                        <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-blue-100 text-blue-700 font-bold rounded-xl text-xs">${q.id}</span>
                        <p class="text-slate-800 font-bold leading-relaxed">${q.q}</p>
                    </div>
                    <div class="space-y-3" id="options-${q.id}">
                        ${['A', 'B', 'C', 'D'].map((label, i) => `
                            <div class="option-card" onclick="selectOption('${key}', ${q.id}, '${label}', this)">
                                <div class="w-6 h-6 rounded-full border-2 border-slate-300 mr-3 flex items-center justify-center text-[10px] font-bold text-slate-400">
                                    ${label}
                                </div>
                                <span class="text-slate-600 font-medium">${q.options[i]}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function selectOption(testKey, qId, label, element) {
            const parent = document.getElementById(`options-${qId}`);
            parent.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            userAnswers[testKey][qId] = label;
            updateProgressBar();
        }

        function updateProgressBar() {
            const total = allTests[currentTestKey].questions.length;
            const answered = Object.keys(userAnswers[currentTestKey] || {}).length;
            document.getElementById('progressBar').style.width = (answered / total * 100) + '%';
        }

        function submitTest() {
            const test = allTests[currentTestKey];
            let score = 0;
            test.questions.forEach(q => {
                const ans = userAnswers[currentTestKey][q.id];
                const card = document.getElementById(`q-card-${q.id}`);
                const options = document.getElementById(`options-${q.id}`).querySelectorAll('.option-card');
                options.forEach((opt, i) => {
                    const label = ['A', 'B', 'C', 'D'][i];
                    opt.style.pointerEvents = 'none';
                    if (label === q.a) opt.classList.add('correct');
                    else if (label === ans) opt.classList.add('incorrect');
                });
                if (ans === q.a) score++;
            });

            // Lưu lịch sử
            const bestScore = testHistory[currentTestKey]?.score || 0;
            testHistory[currentTestKey] = {
                title: test.title,
                score: Math.max(score, bestScore),
                total: test.questions.length,
                date: new Date().toLocaleDateString('vi-VN')
            };
            localStorage.setItem('toeic_history', JSON.stringify(testHistory));
            updateDashboard();

            // Hiển thị modal
            document.getElementById('finalScore').innerText = score;
            const feedback = score >= 25 ? "Tuyệt vời! Bạn đã sẵn sàng đi thi." : (score >= 15 ? "Khá tốt! Hãy luyện thêm các câu sai." : "Bạn cần cố gắng nhiều hơn.");
            document.getElementById('feedbackText').innerText = feedback;
            document.getElementById('resultEmoji').innerText = score >= 25 ? "🏆" : "📈";
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function updateDashboard() {
            const historyKeys = Object.keys(testHistory);
            document.getElementById('statsCompleted').innerText = historyKeys.length;
            
            let totalCorrect = 0;
            let totalQ = 0;
            historyKeys.forEach(k => {
                totalCorrect += testHistory[k].score;
                totalQ += testHistory[k].total;
            });
            const avg = totalQ > 0 ? Math.round(totalCorrect / totalQ * 100) : 0;
            document.getElementById('statsAvg').innerText = avg + '%';

            const list = document.getElementById('dashboardList');
            list.innerHTML = '';
            
            if (historyKeys.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">Chưa có dữ liệu bài thi. Hãy bắt đầu ngay!</div>`;
                return;
            }

            historyKeys.sort((a,b) => b.localeCompare(a)).forEach(key => {
                const data = testHistory[key];
                const percent = Math.round(data.score / data.total * 100);
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-bold text-slate-800">${data.title}</p>
                            <p class="text-[10px] text-slate-400">Hoàn thành: ${data.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black ${percent >= 80 ? 'text-green-600' : 'text-blue-600'}">${data.score}/${data.total}</p>
                            <div class="w-16 h-1.5 bg-slate-100 rounded-full mt-1">
                                <div class="h-full rounded-full ${percent >= 80 ? 'bg-green-500' : 'bg-blue-500'}" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function showView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if (view === 'quiz') {
                document.getElementById('quizView').classList.add('active');
                document.getElementById('nav-quiz').classList.add('active');
                document.getElementById('quizTabMenu').classList.remove('hidden');
                document.getElementById('quizProgress').classList.remove('hidden');
                document.getElementById('viewSubtitle').innerText = "Luyện thi Part 5";
            } else {
                document.getElementById('dashboardView').classList.add('active');
                document.getElementById('nav-dashboard').classList.add('active');
                document.getElementById('quizTabMenu').classList.add('hidden');
                document.getElementById('quizProgress').classList.add('hidden');
                document.getElementById('viewSubtitle').innerText = "Thành tích của bạn";
            }
        }

        function resetCurrentTest() { loadTest(currentTestKey); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function closeModal() { document.getElementById('resultModal').classList.add('hidden'); }

        window.onload = initApp;
    </script>
</body>
</html>
